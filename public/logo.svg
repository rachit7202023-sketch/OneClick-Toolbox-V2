<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep premium purple radial gradient, center slightly above middle -->
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="68%">
      <stop offset="0%"   stop-color="#3E1680"/>
      <stop offset="45%"  stop-color="#260C5A"/>
      <stop offset="100%" stop-color="#0F0328"/>
    </radialGradient>

    <!-- A glyph: pure white at apex, soft lavender at leg bottoms -->
    <linearGradient id="aGrad" x1="512" y1="131" x2="512" y2="863" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="28%"  stop-color="#F4EEFF"/>
      <stop offset="70%"  stop-color="#C5A8F0"/>
      <stop offset="100%" stop-color="#9B6FD8"/>
    </linearGradient>

    <!-- Subtle inner-left gloss overlay -->
    <radialGradient id="glossGrad" cx="38%" cy="64%" r="38%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="45%"  stop-color="#D0B8FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip the gloss to the A shape -->
    <clipPath id="aClip">
      <path d="M 164,801 L 436,131 A 82,82 0 0,1 588,131 L 860,801 A 82,82 0 1,1 708,863 L 523,408 A 30,30 0 0,1 501,408 L 316,863 A 82,82 0 1,1 164,801 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded-square background -->
  <rect width="1024" height="1024" rx="222" ry="222" fill="url(#bgGrad)"/>

  <!--
    The "A" letterform — a precise closed path:
      • M 164,801         left outer bottom tangent
      • L 436,131         up the left outer edge
      • A …0,1 588,131    arc over the outer apex (CW, 135.6°, r=82)
      • L 860,801         down the right outer edge
      • A …1,1 708,863    arc under the right leg cap (CW, 180°, r=82)
      • L 523,408         up the right inner edge
      • A …0,1 501,408    inner-notch rounded cap (CW, 43°, r=30)
      • L 316,863         down the left inner edge
      • A …1,1 164,801    arc under the left leg cap (CW, 180°, r=82)
      • Z
  -->
  <path
    d="M 164,801
       L 436,131
       A 82,82 0 0,1 588,131
       L 860,801
       A 82,82 0 1,1 708,863
       L 523,408
       A 30,30 0 0,1 501,408
       L 316,863
       A 82,82 0 1,1 164,801
       Z"
    fill="url(#aGrad)"
  />

  <!-- Gloss highlight, clipped to A -->
  <rect width="1024" height="1024" fill="url(#glossGrad)" clip-path="url(#aClip)" opacity="0.85"/>
</svg>
